services:
  postgres-test:
    image: postgres:16-alpine
    container_name: pipegen-test-db
    environment:
      POSTGRES_DB: pipegen_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
